<!DOCTYPE html>
<html>
<head>
<title>Oceany Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="scene">
  
  <!-- Animated ocean background -->
  <div class="ocean-background">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <!-- Floating bubbles -->
  <div class="bubbles-container">
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>
    <div class="bubble bubble-4"></div>
    <div class="bubble bubble-5"></div>
    <div class="bubble bubble-6"></div>
    <div class="bubble bubble-7"></div>
    <div class="bubble bubble-8"></div>
  </div>

  <!-- Decorative shells and starfish -->
  <div class="shell shell-1">🐚</div>
  <div class="shell shell-2">🐚</div>
  <div class="starfish starfish-1">⭐</div>
  <div class="starfish starfish-2">⭐</div>

  <!-- Calculator container -->
  <div class="container">
    <h2 class="title">Calculate With Oceany</h2>
    
    <input id="display" class="display" placeholder="0">
    
    <div class="calculator">
      <button>Deg</button>
      <button>Inv</button>
      <button>Clr</button>
      <button>(</button>
      <button>)</button>
      <button>⌫</button>
      <button>÷</button>

      <button>ln</button>
      <button>sin</button>
      <button>%</button>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>x</button>

      <button>log</button>
      <button>cos</button>
      <button>x!</button>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>-</button>

      <button>π</button>
      <button>tan</button>
      <button>xʸ</button>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>+</button>

      <button>e</button>
      <button>√</button>
      <button>x²</button>
      <button>0</button>
      <button>.</button>
      <button>exp</button>
      <button class="equal">=</button>
    </div>
  </div>

  <!-- Sand shoreline -->
  <div class="sand-container">
    <div class="sand sand-wave-1"></div>
    <div class="sand sand-wave-2"></div>
    <div class="sand sand-wave-3"></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
